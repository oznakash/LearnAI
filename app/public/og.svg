<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">LearnAI — Don't learn alone. The AI learning network for builders.</title>
  <defs>
    <linearGradient id="bg-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0a0e1d"/>
    </linearGradient>
    <radialGradient id="bg-glow-1" cx="0.15" cy="0.20" r="0.65">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="0.85" cy="0.75" r="0.55">
      <stop offset="0" stop-color="#28e0b3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#28e0b3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a283ff"/>
      <stop offset="0.55" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <linearGradient id="mascot-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <radialGradient id="mascot-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffb547" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.40"/>
    </filter>
    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background: just the gradient + two soft glows. -->
  <rect width="1200" height="630" fill="url(#bg-base)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-1)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>

  <!-- Soft halo behind mascot -->
  <circle cx="950" cy="370" r="220" fill="url(#halo)"/>

  <!-- Wordmark — top-left, no chip, no subhead -->
  <text x="80" y="135" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="48" fill="#ffffff" letter-spacing="-1.5">LearnAI</text>

  <!-- Hero — 3-word problem statement, brand gradient, big -->
  <text x="80" y="320" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="120" fill="url(#brand)" letter-spacing="-3.5" filter="url(#text-shadow)">Don&apos;t learn alone.</text>

  <!-- Single subline -->
  <text x="80" y="380" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="28" fill="#bcc1d6" letter-spacing="0.2">The AI learning network for builders.</text>

  <!-- Three minimal chips, low-key (no shadow, thinner stroke) -->
  <g transform="translate(80, 460)" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="500">
    <g>
      <rect width="180" height="48" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      <text x="24" y="32" fill="#e6e8f2">5-min Sparks</text>
    </g>
    <g transform="translate(196, 0)">
      <rect width="180" height="48" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      <text x="24" y="32" fill="#e6e8f2">Real builders</text>
    </g>
    <g transform="translate(392, 0)">
      <rect width="180" height="48" rx="24" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      <text x="24" y="32" fill="#e6e8f2">Build cards</text>
    </g>
  </g>

  <!-- Mascot EmDash — right side, smaller, no speech bubble -->
  <g transform="translate(870, 230) scale(2.6)" filter="url(#soft-shadow)">
    <line x1="60" y1="14" x2="60" y2="26" stroke="#28e0b3" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="12" r="5" fill="#ffb547"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-body)" stroke="#0b1020" stroke-width="2"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-glow)"/>
    <rect x="32" y="48" width="56" height="40" rx="14" fill="#fefae6"/>
    <!-- happy eyes -->
    <path d="M37 60 Q42 53 47 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M73 60 Q78 53 83 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- big smile -->
    <path d="M48 78 Q60 92 72 78" stroke="#0b1020" stroke-width="3" fill="#ffb547" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="34" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <circle cx="86" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <!-- arms — left waving -->
    <circle cx="106" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    <g transform="rotate(-25 14 70)">
      <line x1="14" y1="70" x2="2" y2="50" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
      <circle cx="0" cy="48" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    </g>
  </g>

  <!-- Hostname pin — single line, low contrast -->
  <text x="80" y="580" font-family="'Inter', monospace" font-size="20" fill="rgba(230,232,242,0.55)">learnai.cloud-claude.com</text>
</svg>
