<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">LearnAI — Learning starts now!</title>
  <defs>
    <radialGradient id="bg-glow-1" cx="0.18" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="0.92" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#28e0b3" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#28e0b3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0a0e1d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <linearGradient id="mascot-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <radialGradient id="mascot-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-base)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-1)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>

  <!-- Floating sparkles + emoji-style accents -->
  <g opacity="0.65">
    <text x="120" y="120" font-family="system-ui, sans-serif" font-size="44">✨</text>
    <text x="1060" y="540" font-family="system-ui, sans-serif" font-size="56">⚡</text>
    <text x="80" y="540" font-family="system-ui, sans-serif" font-size="48">🧠</text>
    <text x="1080" y="200" font-family="system-ui, sans-serif" font-size="40">✨</text>
    <text x="600" y="80" font-family="system-ui, sans-serif" font-size="36">🌟</text>
  </g>

  <!-- Brand mark (rounded square with "AI") -->
  <g transform="translate(80, 230)">
    <rect width="92" height="92" rx="22" fill="url(#brand)" filter="url(#soft-shadow)"/>
    <text x="46" y="62" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="38" fill="#ffffff" text-anchor="middle">AI</text>
  </g>

  <!-- Wordmark -->
  <text x="194" y="297" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="96" fill="#ffffff" letter-spacing="-2">LearnAI</text>

  <!-- Tagline (kept short, fun, on-brand) -->
  <text x="80" y="402" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="44" fill="url(#brand)">Learning starts now!</text>

  <!-- Sub copy -->
  <text x="80" y="448" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="26" fill="#bcc1d6">5-minute Sparks · daily streaks · build what sticks.</text>

  <!-- Mini chips -->
  <g transform="translate(80, 488)" font-family="'Inter', system-ui, sans-serif" font-size="22" fill="#e6e8f2">
    <g>
      <rect width="170" height="48" rx="24" fill="rgba(124,92,255,0.18)" stroke="rgba(124,92,255,0.55)"/>
      <text x="20" y="32">⚡ 5-min Sparks</text>
    </g>
    <g transform="translate(190, 0)">
      <rect width="190" height="48" rx="24" fill="rgba(40,224,179,0.16)" stroke="rgba(40,224,179,0.55)"/>
      <text x="20" y="32">🔥 Daily streaks</text>
    </g>
    <g transform="translate(400, 0)">
      <rect width="190" height="48" rx="24" fill="rgba(255,181,71,0.16)" stroke="rgba(255,181,71,0.55)"/>
      <text x="20" y="32">🛠️ Build cards</text>
    </g>
  </g>

  <!-- Synapse mascot, big, on the right -->
  <g transform="translate(840, 165) scale(2.6)" filter="url(#soft-shadow)">
    <!-- antenna -->
    <line x1="60" y1="14" x2="60" y2="26" stroke="#28e0b3" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="12" r="4.5" fill="#ffb547"/>
    <!-- head -->
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-body)" stroke="#0b1020" stroke-width="2"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-glow)"/>
    <!-- face plate -->
    <rect x="32" y="48" width="56" height="40" rx="14" fill="#fefae6"/>
    <!-- happy eyes -->
    <path d="M37 60 Q42 53 47 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M73 60 Q78 53 83 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- mouth -->
    <path d="M48 78 Q60 92 72 78" stroke="#0b1020" stroke-width="3" fill="#ffb547" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="34" cy="78" r="3" fill="#ff8fb1" opacity="0.6"/>
    <circle cx="86" cy="78" r="3" fill="#ff8fb1" opacity="0.6"/>
    <!-- arms -->
    <circle cx="14" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    <circle cx="106" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
  </g>

  <!-- Hostname pin -->
  <g transform="translate(80, 568)">
    <text font-family="'Inter', monospace" font-size="20" fill="rgba(230,232,242,0.5)">learnai.cloud-claude.com</text>
  </g>
</svg>
