# fly.toml — deploys the mem0 cognition layer for BuilderQuest.
#
# This deploys ONLY the mem0 server. Postgres + pgvector is provisioned
# separately (and attached) via:
#
#   fly postgres create --name builderquest-mem0-db --region iad
#   fly postgres attach -a builderquest-mem0 builderquest-mem0-db
#
# That command sets DATABASE_URL on the app automatically; the env block
# below maps the same value into the variables mem0 expects.
#
# Then deploy the mem0 server:
#
#   fly deploy --image ghcr.io/oznakash/mem0:latest
#
# Set required secrets (one-time):
#
#   fly secrets set \
#     MEM0_API_KEY="$(openssl rand -hex 32)" \
#     OPENAI_API_KEY="sk-..." \
#     -a builderquest-mem0
#
# (Or use ANTHROPIC_API_KEY + flip MEM0_LLM_PROVIDER to "anthropic".)
#
# After deploy, paste the app's URL + the bearer key into BuilderQuest:
#   Admin Console → Memory tab → Server URL + API key → Health check.

app = "builderquest-mem0"
primary_region = "iad"   # Change to whichever region your players cluster in.

[build]
  image = "ghcr.io/oznakash/mem0:latest"

[env]
  PORT = "8000"
  MEM0_LLM_PROVIDER = "openai"
  MEM0_EMBEDDING_PROVIDER = "openai"
  VECTOR_STORE = "pgvector"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"   # Pause when idle to save money.
  min_machines_running = 0      # Bump to 1 once you have real users.
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"
  grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512   # 1024 if you turn on streaming or run a heavy LLM model.

[[mounts]]
  # Persistent local cache (mem0 caches embeddings here on some setups).
  source = "mem0_cache"
  destination = "/data"
  initial_size = "1gb"
