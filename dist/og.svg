<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">LearnAI — Learning starts now!</title>
  <defs>
    <radialGradient id="bg-glow-1" cx="0.18" cy="0.10" r="0.75">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-2" cx="0.95" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#28e0b3" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#28e0b3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow-3" cx="0.55" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#ff8fb1" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ff8fb1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0a0e1d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a283ff"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <linearGradient id="mascot-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <radialGradient id="mascot-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffb547" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ff8fb1" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff8fb1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-base)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-1)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-2)"/>
  <rect width="1200" height="630" fill="url(#bg-glow-3)"/>

  <!-- Confetti dots scattered for movement -->
  <g opacity="0.7">
    <circle cx="250" cy="80" r="4" fill="#28e0b3"/>
    <circle cx="380" cy="180" r="3" fill="#ffb547"/>
    <circle cx="540" cy="60" r="5" fill="#ff8fb1"/>
    <circle cx="720" cy="120" r="3" fill="#7c5cff"/>
    <circle cx="930" cy="60" r="4" fill="#28e0b3"/>
    <circle cx="180" cy="350" r="3" fill="#ff8fb1"/>
    <circle cx="80" cy="460" r="4" fill="#7c5cff"/>
    <circle cx="650" cy="540" r="4" fill="#ffb547"/>
    <circle cx="780" cy="600" r="3" fill="#28e0b3"/>
    <circle cx="980" cy="510" r="5" fill="#ff8fb1"/>
    <circle cx="1130" cy="400" r="3" fill="#7c5cff"/>
    <circle cx="1100" cy="100" r="3" fill="#ffb547"/>
    <circle cx="60" cy="220" r="4" fill="#28e0b3"/>
    <circle cx="455" cy="430" r="3" fill="#ffb547"/>
  </g>

  <!-- Tiny stars (4-point) for sparkle vibes -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M 150 110 l 3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
    <path d="M 1080 270 l 3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
    <path d="M 320 540 l 2 7 7 2 -7 2 -2 7 -2 -7 -7 -2 7 -2 z"/>
    <path d="M 850 90 l 2 7 7 2 -7 2 -2 7 -2 -7 -7 -2 7 -2 z"/>
    <path d="M 1010 460 l 2 7 7 2 -7 2 -2 7 -2 -7 -7 -2 7 -2 z"/>
  </g>

  <!-- Halo behind mascot for energy -->
  <circle cx="970" cy="345" r="240" fill="url(#halo)"/>

  <!-- Brand chip (rounded square with "AI") -->
  <g transform="translate(80, 110)">
    <rect width="104" height="104" rx="26" fill="url(#brand)" filter="url(#soft-shadow)"/>
    <text x="52" y="71" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="44" fill="#ffffff" text-anchor="middle">AI</text>
    <!-- pulse ring -->
    <rect x="-6" y="-6" width="116" height="116" rx="32" fill="none" stroke="#7c5cff" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="195" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="108" fill="#ffffff" letter-spacing="-3" filter="url(#text-shadow)">LearnAI</text>
  <text x="220" y="240" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="22" fill="#bcc1d6" letter-spacing="0.3">The AI-native learning network</text>

  <!-- Hero tagline -->
  <text x="80" y="345" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="700" font-size="76" fill="url(#brand)" letter-spacing="-2" filter="url(#text-shadow)">Learning starts now!</text>
  <text x="80" y="386" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="26" fill="#e6e8f2" letter-spacing="0.2">5-minute Sparks · daily streaks · build what sticks.</text>

  <!-- Feature chips with subtle shadow -->
  <g transform="translate(80, 432)" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="600" filter="url(#soft-shadow)">
    <g>
      <rect width="190" height="52" rx="26" fill="rgba(124,92,255,0.20)" stroke="rgba(124,92,255,0.65)" stroke-width="1.5"/>
      <text x="22" y="34" fill="#ffffff">⚡ 5-min Sparks</text>
    </g>
    <g transform="translate(210, 0)">
      <rect width="220" height="52" rx="26" fill="rgba(40,224,179,0.18)" stroke="rgba(40,224,179,0.65)" stroke-width="1.5"/>
      <text x="22" y="34" fill="#ffffff">🔥 Daily streaks</text>
    </g>
    <g transform="translate(450, 0)">
      <rect width="200" height="52" rx="26" fill="rgba(255,181,71,0.18)" stroke="rgba(255,181,71,0.65)" stroke-width="1.5"/>
      <text x="22" y="34" fill="#ffffff">🛠️ Build cards</text>
    </g>
  </g>

  <!-- Free + open-source ribbon -->
  <g transform="translate(80, 510)" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="20">
    <text x="0" y="22" fill="#9ba3c7">Free · open source · 5 mins/day · 12 Constellations × 10 Levels</text>
  </g>

  <!-- Mascot EmDash — bigger, with speech bubble -->
  <g transform="translate(810, 200) scale(2.95)" filter="url(#soft-shadow)">
    <line x1="60" y1="14" x2="60" y2="26" stroke="#28e0b3" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="12" r="5" fill="#ffb547"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-body)" stroke="#0b1020" stroke-width="2"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mascot-glow)"/>
    <rect x="32" y="48" width="56" height="40" rx="14" fill="#fefae6"/>
    <!-- happy eyes -->
    <path d="M37 60 Q42 53 47 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M73 60 Q78 53 83 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- big smile -->
    <path d="M48 78 Q60 92 72 78" stroke="#0b1020" stroke-width="3" fill="#ffb547" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="34" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <circle cx="86" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <!-- arms — left waving -->
    <circle cx="106" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    <g transform="rotate(-25 14 70)">
      <line x1="14" y1="70" x2="2" y2="50" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
      <circle cx="0" cy="48" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    </g>
  </g>

  <!-- Speech bubble from mascot -->
  <g transform="translate(770, 175)" filter="url(#soft-shadow)">
    <path d="M 0 30 Q 0 0 30 0 L 220 0 Q 250 0 250 30 L 250 70 Q 250 100 220 100 L 80 100 L 50 130 L 60 100 L 30 100 Q 0 100 0 70 Z"
          fill="#ffffff" stroke="rgba(124,92,255,0.55)" stroke-width="2"/>
    <text x="20" y="42" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="24" fill="#0b1020">Hey 👋 builder!</text>
    <text x="20" y="72" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="18" fill="#3a3f5c">Wanna learn AI in</text>
    <text x="20" y="92" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="18" fill="#7c5cff">5 minutes a day?</text>
  </g>

  <!-- Floating emoji accents -->
  <text x="115" y="78" font-family="system-ui, sans-serif" font-size="42" opacity="0.85">✨</text>
  <text x="1110" y="615" font-family="system-ui, sans-serif" font-size="58" opacity="0.85">⚡</text>
  <text x="60" y="600" font-family="system-ui, sans-serif" font-size="48" opacity="0.85">🧠</text>
  <text x="1090" y="320" font-family="system-ui, sans-serif" font-size="40" opacity="0.85">🌟</text>
  <text x="650" y="78" font-family="system-ui, sans-serif" font-size="36" opacity="0.85">✨</text>

  <!-- Hostname pin + arrow -->
  <g transform="translate(80, 580)" font-family="'Inter', monospace" font-size="20">
    <text fill="rgba(230,232,242,0.65)">→ learnai.cloud-claude.com</text>
  </g>
</svg>
