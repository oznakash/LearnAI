<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="LearnAI · EmDash">
  <!--
    LearnAI app icon — EmDash mascot on a square brand-gradient
    background. The mascot is the canonical brand mark used in og.svg
    + Mascot.tsx (the in-app character). Reusing it here keeps the
    LinkedIn submission, the home-screen icon, and the rest of the
    brand surface visually consistent.

    Used by:
      - LinkedIn OAuth app submission (operator pastes the rendered
        PNG; see docs/profile-linkedin.md §10)
      - PWA manifest in v2
      - any future "share to X with our logo" flow

    The body uses the same purple → teal gradient as Mascot.tsx, on
    top of the brand-deep-purple background.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1245"/>
      <stop offset="0.55" stop-color="#321b78"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#a283ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#a283ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#28e0b3"/>
    </linearGradient>
    <radialGradient id="mglow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0b0418" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Rounded-square brand-gradient background. iOS / Android masks
       round corners further; this rx keeps the silhouette consistent
       on platforms that don't mask. -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soft halo behind the mascot -->
  <circle cx="256" cy="276" r="200" fill="url(#halo)"/>

  <!--
    EmDash, scaled up. Source viewBox is 0 0 120 120, mascot occupies
    roughly y=10..98 (antenna 10..28 + body 28..98). To make the body
    + antenna fit nicely with breathing room:
      scale 3.4× (3.4·120 = 408)
      translate to center (512-408)/2 = 52, +6 vertical lift
    Same paths / strokes as app/src/visuals/Mascot.tsx — kept in sync.
  -->
  <g transform="translate(52, 58) scale(3.4)" filter="url(#soft-shadow)">
    <!-- antenna -->
    <line x1="60" y1="14" x2="60" y2="26" stroke="#28e0b3" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="12" r="5" fill="#ffb547"/>
    <!-- head -->
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mbody)" stroke="#0b1020" stroke-width="2"/>
    <rect x="20" y="28" width="80" height="70" rx="22" fill="url(#mglow)"/>
    <!-- face plate -->
    <rect x="32" y="48" width="56" height="40" rx="14" fill="#fefae6"/>
    <!-- happy eyes -->
    <path d="M37 60 Q42 53 47 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M73 60 Q78 53 83 60" stroke="#0b1020" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- big smile -->
    <path d="M48 78 Q60 92 72 78" stroke="#0b1020" stroke-width="3" fill="#ffb547" stroke-linecap="round"/>
    <!-- cheeks -->
    <circle cx="34" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <circle cx="86" cy="78" r="3" fill="#ff8fb1" opacity="0.7"/>
    <!-- arms (the round purple knobs on either side) -->
    <circle cx="14" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
    <circle cx="106" cy="70" r="6" fill="#7c5cff" stroke="#0b1020" stroke-width="2"/>
  </g>
</svg>
