<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- App icon set (rasterized from public/icon.svg via
         scripts/generate-icons.mjs). Used by browser tabs, the home-
         screen "Add to" prompt on iOS / Android, and as the operator's
         submission logo for OAuth providers (LinkedIn, etc.) — see
         docs/profile-linkedin.md §10. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1020" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Primary -->
    <title>LearnAI — Don't learn alone.</title>
    <meta name="description" content="LearnAI is the AI learning network for builders, creators, and the curious. 5-minute Sparks, real builders alongside you, build cards you can ship today. Don't learn alone." />
    <meta name="author" content="LearnAI" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, iMessage…)
         IMPORTANT: og:image MUST be a raster format (PNG/JPG/GIF/WebP).
         All major unfurlers silently drop SVG og:images, which is why
         the previous og.svg never rendered a card. The PNG is generated
         from app/public/og.svg by `npm run og:build` and shipped as a
         static asset under the same dist/ tree. -->
    <meta property="og:site_name" content="LearnAI" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://learnai.cloud-claude.com/" />
    <meta property="og:title" content="LearnAI — Don't learn alone." />
    <meta property="og:description" content="The AI learning network for builders. 5-min Sparks, real builders alongside you, build cards you can run in Claude Code. EmDash is waiting." />
    <meta property="og:image" content="https://learnai.cloud-claude.com/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LearnAI — Don't learn alone. EmDash the robot mascot waves next to a brand-gradient headline and three chips: 5-min Sparks, real builders, build cards." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LearnAI — Don't learn alone." />
    <meta name="twitter:description" content="The AI learning network for builders. 5-min Sparks, real builders alongside you, build cards you can ship today." />
    <meta name="twitter:image" content="https://learnai.cloud-claude.com/og.png" />
    <meta name="twitter:image:alt" content="LearnAI — Don't learn alone. EmDash the robot mascot waves next to the LearnAI wordmark." />

    <!-- Canonical -->
    <link rel="canonical" href="https://learnai.cloud-claude.com/" />
    <script type="module" crossorigin src="/assets/index-CDoWrx9p.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D3GwQl3l.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
