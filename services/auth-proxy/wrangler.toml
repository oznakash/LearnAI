# Cloudflare Worker config. `wrangler deploy` (after `wrangler login`)
# stands this up at <name>.<your-account>.workers.dev. Bind a custom
# domain in the Cloudflare dashboard once it's live.

name = "learnai-auth-proxy"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# Public values — safe to commit. Override with `wrangler secret put`
# for the upstream API keys.
[vars]
GOOGLE_OAUTH_CLIENT_ID = ""
SOCIAL_SVC_URL = "https://learnai-social-svc.fly.dev"
MEM0_URL = "https://mem0-09b7ea.cloud-claude.com"
ALLOWED_ORIGINS = "*"
ALLOW_DEMO_HEADER = "0"

# Secrets injected with: wrangler secret put UPSTREAM_KEY_SOCIAL
# Don't commit these.

# KV namespace for rate-limit buckets.
# Create with: wrangler kv namespace create RATE_LIMITS
# Then paste the id below.
# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id = "<paste-id-here>"
