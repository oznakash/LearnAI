name: Build & publish /dist

# Two roles in one workflow:
#   1. PR-time gate: on every pull_request that touches `app/**` (or
#      this workflow itself), build + test the SPA so the operator
#      can see green/red before merging. No commit, no push.
#   2. Post-merge publisher: on push to `main`, the same build + test
#      runs, then commits the rebuilt `/dist/` so static-mirror
#      deployers (e.g. cloud-claude.com nginx) always serve the
#      latest built SPA without having to run a build themselves.
#
# The commit step is gated on `github.event_name == 'push'` so PRs
# from forks (read-only token) never try to write back.

on:
  pull_request:
    paths:
      - "app/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-and-publish-dist.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-and-publish-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install + build
        env:
          # Production deployment defaults — baked into the SPA bundle.
          # All three are public values (URLs + an OAuth Client ID), so they
          # live in repository variables, not secrets. Forks without these
          # set will fall back to demo mode (handled in admin/defaults.ts).
          VITE_SERVER_AUTH_DEFAULT: ${{ vars.VITE_SERVER_AUTH_DEFAULT }}
          VITE_MEM0_URL: ${{ vars.VITE_MEM0_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm install --prefix app
          npm run build --prefix app

      - name: Test
        run: npm test --prefix app

      - name: Commit /dist/ if changed
        if: github.event_name == 'push'
        run: |
          git config user.name "builderquest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A dist
          if git diff --cached --quiet; then
            echo "No /dist/ changes — skipping commit."
            exit 0
          fi
          git commit -m "ci: rebuild /dist/ from ${GITHUB_SHA::7}"
          git push origin HEAD:main
