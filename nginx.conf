# LearnAI nginx — serves the SPA + reverse-proxies social API to the
# Node sidecar running on localhost:8787 (started by the same container's
# entrypoint script).
#
# Note: server-block-level access_log / error_log directives — these
# inherit from the upstream nginx:1.27-alpine image's main http context
# which already routes to /dev/stdout + /dev/stderr. Keeping it that
# way means cloud-claude captures both nginx and Node sidecar logs
# in one stream, no extra plumbing.

upstream social_svc {
  server 127.0.0.1:8787;
  keepalive 32;
}

# Cloud-Claude's outer load balancer terminates TLS, then forwards to
# this nginx as plain http. Inside the container, $scheme is always
# "http", which would force the SSR canonical / sitemap URLs to use
# `http://`. Honor the original protocol from the upstream
# X-Forwarded-Proto header when present, fall back to $scheme. Same
# trick the Express docs recommend for `app.set('trust proxy', ...)`.
map $http_x_forwarded_proto $real_scheme {
  default $scheme;
  https   https;
  http    http;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text content
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # ── Social API → Node sidecar ────────────────────────────────────────
  # Same-origin so the SPA can call /v1/social/* without CORS.
  location /v1/social/ {
    proxy_pass         http://social_svc;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $real_scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering    off;
  }

  # ── Email API → Node sidecar ─────────────────────────────────────────
  # Admin-only SMTP send + status endpoints (requires admin bearer).
  # Mirrors /v1/social/ proxy config — same upstream, same timeouts.
  location /v1/email/ {
    proxy_pass         http://social_svc;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $real_scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_buffering    off;
  }

  # Sidecar healthcheck — exposed at /health-social so cloud-claude can
  # probe the sidecar independently of nginx's own / probe.
  location = /health-social {
    proxy_pass http://social_svc/health;
    access_log off;
  }

  # ── User-uploaded images ─────────────────────────────────────────────
  # social-svc writes avatars + hero banners to /data/uploads/<emailHash>/<kind>.<ext>.
  # nginx serves them as static files — no Node round-trip per request.
  # Same-origin so the SPA can <img src="/i/..."> without CORS, and the
  # SSR `og:image` carries the same-origin URL too.
  location /i/ {
    alias /data/uploads/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff";
    add_header Cross-Origin-Resource-Policy "same-origin";
    try_files $uri =404;
    access_log off;
  }

  # ── Public SSR surface (SEO + share-link unfurls) ────────────────────
  # Crawlers and unfurlers can't run the SPA, so /u/<handle>,
  # /robots.txt, and /sitemap.xml are served directly by the Node sidecar
  # which renders real HTML / text per request. The SPA still owns
  # client-side navigation to /u/<handle> for signed-in users (history
  # pushState, no server round-trip), so the React Profile view is
  # untouched — this is purely the cold-load + bot path.
  location ~ ^/u/[^/]+/?$ {
    proxy_pass         http://social_svc;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $real_scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
  }
  location = /robots.txt {
    proxy_pass         http://social_svc/robots.txt;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Proto $real_scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    access_log off;
  }
  location = /sitemap.xml {
    proxy_pass         http://social_svc/sitemap.xml;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Proto $real_scheme;
    proxy_set_header   X-Forwarded-Host  $host;
  }

  # ── Static SPA ────────────────────────────────────────────────────────
  # long-cache static assets (Vite emits hashed filenames, safe to cache hard)
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every unknown path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # don't cache the entry HTML so deploys take effect immediately
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
