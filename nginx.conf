server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip text content
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # long-cache static assets (Vite emits hashed filenames, safe to cache hard)
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every unknown path serves index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # don't cache the entry HTML so deploys take effect immediately
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
