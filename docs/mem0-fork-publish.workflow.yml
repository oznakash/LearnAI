# =============================================================================
# Template — NOT executed in this repo.
#
# Copy this file into your mem0 FORK at:
#   https://github.com/oznakash/mem0
#   path: .github/workflows/publish-image.yml
#
# Once committed, every push to the fork's `main` branch (and every `v*` tag)
# builds a Docker image and publishes it to the GitHub Container Registry at:
#
#   ghcr.io/oznakash/mem0:latest      (built from main)
#   ghcr.io/oznakash/mem0:sha-abc1234 (per-commit pin — use this for prod)
#
# One-time after the first successful build: open the package's settings on
# GitHub and set its visibility to **public**, otherwise BuilderQuest's
# docker-compose can't pull it without auth.
# =============================================================================

name: Build & publish image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oznakash/mem0
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
